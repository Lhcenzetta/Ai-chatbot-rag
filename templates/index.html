<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Atlas Insurance Assistant</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            --bg-gradient: radial-gradient(circle at top right, #0f172a, #020617);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #60a5fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            max-height: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        .chat-header {
            padding: 24px;
            background: rgba(15, 23, 42, 0.6);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar-container {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.25);
            transform: rotate(-5deg);
        }

        .header-info h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 2px;
            letter-spacing: -0.02em;
        }

        .status {
            font-size: 0.85rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0.9;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 12px #10b981;
        }

        #chat {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        #chat::-webkit-scrollbar {
            width: 5px;
        }

        #chat::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .user {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-right-radius: 4px;
        }

        .assistant {
            align-self: flex-start;
            background: var(--primary-gradient);
            color: #fff;
            border-bottom-left-radius: 4px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        #controls {
            padding: 24px;
            background: rgba(15, 23, 42, 0.4);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
        }

        #input {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        #input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        #send {
            background: var(--primary-gradient);
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
        }

        #send:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(59, 130, 246, 0.4);
        }

        #send:active {
            transform: scale(0.95);
        }

        .send-icon {
            width: 24px;
            height: 24px;
            fill: #fff;
        }

        /* Ambient glowing background */
        .glow {
            position: absolute;
            width: 60vw;
            height: 60vw;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            top: -20%;
            right: -10%;
            z-index: 1;
            pointer-events: none;
        }

        .glow-2 {
            top: auto;
            bottom: -20%;
            left: -10%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="glow glow-2"></div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar-container">
                🛡️
            </div>
            <div class="header-info">
                <h1>Atlas Assistant</h1>
                <div class="status">
                    <div class="status-dot"></div> Secured & Online
                </div>
            </div>
        </div>

        <div id="chat" aria-live="polite">
            <div class="msg assistant">Welcome to Atlas Insurance. How can I assist you with your health, car, or business insurance today?</div>
        </div>

        <div id="controls">
            <input id="input" type="text" placeholder="Ask about plans, claims, or support..." autocomplete="off" />
            <button id="send" aria-label="Send">
                <svg class="send-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="/static/chat.js"></script>
</body>
</html>
